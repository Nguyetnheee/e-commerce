spring.application.name=backend

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/fishing_ecommerce}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:123456}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
# Google OAuth2
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=openid,email,profile

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Connection timeouts to prevent thread blocking
spring.mail.properties[mail.smtp.connectiontimeout]=5000
spring.mail.properties[mail.smtp.timeout]=3000
spring.mail.properties[mail.smtp.writetimeout]=5000

server.port=${PORT:8080}
server.forward-headers-strategy=framework

# Let Swagger UI target the public API URL when Railway exposes the app through a proxy.
# If APP_PUBLIC_URL is not set, it falls back to the same-origin relative path.
springdoc.swagger-ui.url=${APP_PUBLIC_URL:}/v3/api-docs
springdoc.swagger-ui.config-url=${APP_PUBLIC_URL:}/v3/api-docs/swagger-config

admin.staff.secret-key=${ADMIN_STAFF_SECRET_KEY:}

# PayOS redirects after the customer completes or cancels payment.
payos.return-url=https://fishing-website-fe.vercel.app/payment/success
payos.cancel-url=https://fishing-website-fe.vercel.app/payment/failure
